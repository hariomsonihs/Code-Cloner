<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>No Internet — Code Cloner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F5FBFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 320px; }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #5F8EFF, #3CC8A7);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.4rem; color: #13233F; margin-bottom: .5rem; }
    p  { color: #5A6D93; font-size: .95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(115deg, #5F8EFF, #3CC8A7);
      color: #fff; border: none; border-radius: 999px;
      padding: .75rem 2rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>No Internet Connection</h1>
    <p>Please check your connection and try again. Code Cloner needs internet to load content.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
